<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Matt Decker" />
    <meta name="description" content="The music you want to hear" />
    <title>Sugar Snap Peas</title>
    <link rel="icon" href="pics/peai.png" type="image/x-icon" />
    <link rel="stylesheet" href="game.css" type="text/css" />
    <style>
      canvas {
        border: 1px solid #d3d3d3;
        background-color: #f1f1f1;
      }
    </style>
  </head>

  <body>
    <!-- Background + nav -->
    <img style="position:fixed; min-width: 100%; pointer-events: none;" src="Pics/dvp.gif" alt="dvd">
    <a href="index.html"
      ><img class="sspp" src="Pics/bandaid.png" alt="bandaid"
    /></a>

    <div>
      <p  id="title">sugar snap peas the video game</p>
      <div id="game-wrapper">
        <div id="canvas-container"></div>

        <!-- Scoreboard -->
        <div id="scoreboard">
          <h3>High Scores</h3>
          <ol id="scores-list"></ol>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        query,
        orderByChild,
        limitToLast,
        get,
        onValue,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDoa1ykYfKf3eptGGh45q6Rz4j96Ncia9Y",
        authDomain: "sugar-snap-peas-b33f7.firebaseapp.com",
        databaseURL:
          "https://sugar-snap-peas-b33f7-default-rtdb.firebaseio.com",
        projectId: "sugar-snap-peas-b33f7",
        storageBucket: "sugar-snap-peas-b33f7.firebasestorage.app",
        messagingSenderId: "69107123700",
        appId: "1:69107123700:web:c0565f7cbceba1180f25a1",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      var myGamePiece;
      var myObstacles = [];
      var myScore;
      let pendingScore = null;

      function startGame() {
        renderScoreboard();
        myGamePiece = new component(30, 30, "green", 10, 120);
        myGamePiece.gravity = 0.05;
        myScore = new component("30px", "Consolas", "black", 280, 40, "text");
        myGameArea.start();
      }

      async function saveScore(score) {
        const q = query(
          ref(db, "scores"),
          orderByChild("score"),
          limitToLast(10),
        );
        const snapshot = await get(q);
        let scores = [];
        snapshot.forEach((child) => {
          const val = child.val();
          if (val && typeof val.score === "number") {
            scores.push(val.score);
          }
        });

        const isTopTen = scores.length < 10 || score > Math.min(...scores);

        if (isTopTen) {
          pendingScore = score;
          const modal = document.getElementById("name-modal");
          modal.style.display = "flex";
          document.getElementById("name-input").focus();
        } else {
          await push(ref(db, "scores"), {
            score: Number(score),
            name: "Anonymous",
            date: Date.now(),
          });
          showReplayButton();
        }
      }

      async function submitName() {
        const name =
          document.getElementById("name-input").value.trim() || "Anonymous";
        document.getElementById("name-modal").style.display = "none";
        document.getElementById("name-input").value = "";

        try {
          await push(ref(db, "scores"), {
            score: Number(pendingScore),
            name,
            date: Date.now(),
          });
        } catch (e) {
          console.error("push failed:", e);
        }

        pendingScore = null;
        showReplayButton();
      }

      function renderScoreboard() {
        const q = query(
          ref(db, "scores"),
          orderByChild("score"),
          limitToLast(10),
        );
        onValue(q, (snapshot) => {
          let scores = [];
          snapshot.forEach((child) => {
            const val = child.val();
            if (val && typeof val.score === "number") {
              scores.push(val);
            }
          });
          scores.sort((a, b) => b.score - a.score);
          document.getElementById("scores-list").innerHTML =
            scores
              .map((s) => `<li>${s.name || "Anonymous"} — ${s.score}</li>`)
              .join("") || "<li>No scores yet</li>";
        });
      }

      function showReplayButton() {
        document.getElementById("replay-btn").style.display = "inline-block";
      }

      function replayGame() {
        gameOver = false;
        document.getElementById("replay-btn").style.display = "none";
        myObstacles = [];
        myGameArea.frameNo = 0;
        myGamePiece.x = 10;
        myGamePiece.y = 120;
        myGamePiece.gravitySpeed = 0;
        myGamePiece.gravity = 0.05;
        updateGameArea();
      }

      var myGameArea = {
        canvas: document.createElement("canvas"),
        start: function () {
          this.canvas.width = 480;
          this.canvas.height = 270;
          this.context = this.canvas.getContext("2d");
          document.getElementById("canvas-container").appendChild(this.canvas); // ← change this line
          this.frameNo = 0;
          updateGameArea();
        },
        clear: function () {
          this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
        },
      };

      function component(width, height, color, x, y, type) {
        this.type = type;
        this.score = 0;
        this.width = width;
        this.height = height;
        this.speedX = 0;
        this.speedY = 0;
        this.x = x;
        this.y = y;
        this.gravity = 0;
        this.gravitySpeed = 0;
        this.update = function () {
          const ctx = myGameArea.context;
          if (this.type == "text") {
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = color;
            ctx.fillText(this.text, this.x, this.y);
          } else {
            ctx.fillStyle = color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
          }
        };
        this.newPos = function () {
          this.gravitySpeed += this.gravity;
          this.x += this.speedX;
          this.y += this.speedY + this.gravitySpeed;
          this.hitBottom();
        };
        this.hitBottom = function () {
          var rockbottom = myGameArea.canvas.height - this.height;
          if (this.y > rockbottom) {
            this.y = rockbottom;
            this.gravitySpeed = 0;
          }
          if (this.y < 0) {
            this.y = 0;
            this.gravitySpeed = 0;
          }
        };
        this.crashWith = function (otherobj) {
          var myleft = this.x;
          var myright = this.x + this.width;
          var mytop = this.y;
          var mybottom = this.y + this.height;
          var otherleft = otherobj.x;
          var otherright = otherobj.x + otherobj.width;
          var othertop = otherobj.y;
          var otherbottom = otherobj.y + otherobj.height;
          var crash = true;
          if (
            mybottom < othertop ||
            mytop > otherbottom ||
            myright < otherleft ||
            myleft > otherright
          ) {
            crash = false;
          }
          return crash;
        };
      }

      let gameOver = false;

      function updateGameArea() {
        var x, height, gap, minHeight, maxHeight, minGap, maxGap;
        for (let i = 0; i < myObstacles.length; i += 1) {
          if (myGamePiece.crashWith(myObstacles[i])) {
            if (!gameOver) {
              gameOver = true;
              saveScore(myGameArea.frameNo);
            }
            return;
          }
        }
        myGameArea.clear();
        myGameArea.frameNo += 1;
        if (myGameArea.frameNo == 1 || everyinterval(150)) {
          x = myGameArea.canvas.width;
          minHeight = 20;
          maxHeight = 200;
          height = Math.floor(
            Math.random() * (maxHeight - minHeight + 1) + minHeight,
          );
          minGap = 50;
          maxGap = 200;
          gap = Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
          myObstacles.push(new component(10, height, "green", x, 0));
          myObstacles.push(
            new component(10, x - height - gap, "green", x, height + gap),
          );
        }
        for (let i = 0; i < myObstacles.length; i += 1) {
          myObstacles[i].x += -1;
          myObstacles[i].update();
        }
        myScore.text = "SCORE: " + myGameArea.frameNo;
        myScore.update();
        myGamePiece.newPos();
        myGamePiece.update();
      }

      function everyinterval(n) {
        if ((myGameArea.frameNo / n) % 1 == 0) {
          return true;
        }
        return false;
      }

      function accelerate(n) {
        if (!myGameArea.interval) {
          myGameArea.interval = setInterval(updateGameArea, 20);
        }
        myGamePiece.gravity = n;
      }

      window.accelerate = accelerate;
      window.replayGame = replayGame;
      window.submitName = submitName;

      startGame();
    </script>

    <!-- Controls -->
    <div>
      <button onmousedown="accelerate(-0.2)" onmouseup="accelerate(0.05)">
        ACCELERATE
      </button>
      <button id="replay-btn" onclick="replayGame()" style="display: none">
        REPLAY
      </button>
    </div>

    <div
      id="name-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: white;
          padding: 30px;
          text-align: center;
          border-radius: 8px;
        "
      >
        <p>🎉 You made it onto the scoreboard!</p>
        <input
          id="name-input"
          type="text"
          placeholder="Enter your name"
          maxlength="20"
        />
        <br /><br />
        <button type="button" onclick="submitName()">OK</button>
      </div>
    </div>
  </body>
</html>
